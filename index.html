<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamp Experience</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ambient" id="ambient"></div>

<div class="container">
    <div class="lamp">
        <div class="shade"></div>
        <div class="cord-wrap" id="cord-area">
            <div class="cord" id="cord">
                <div class="rope"></div>
                <div class="knob"></div>
            </div>
        </div>
        <div class="stem"></div>
        <div class="base"></div>
    </div>

    <div class="login hidden" id="login">
        <h2>Bem-vinda</h2>
        <input type="text" id="name" placeholder="Teu nome" autocomplete="off">
        <input type="password" placeholder="Palavra-passe">
        <button id="btn">Entrar</button>
    </div>
</div>

<div class="overlay hidden" id="overlay">
    <div class="card" id="cardContent"></div>
</div>

<script src="script.js"></script>
</body>
</html>
