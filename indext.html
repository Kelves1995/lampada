<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamp Experience</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="ambient" id="ambient"></div>

<div class="container">

  <!-- LÂMPADA -->
  <div class="lamp">
    <div class="shade"></div>

    <!-- FIO (DEBAIXO DO CHAPÉU) -->
    <div class="cord-wrap">
      <div class="cord" id="cord">
        <div class="rope"></div>
        <div class="knob"></div>
      </div>
    </div>

    <div class="stem"></div>
    <div class="base"></div>
  </div>

  <!-- LOGIN -->
  <div class="login hidden" id="login">
    <h2>Welcome</h2>
    <input type="text" id="name" placeholder="Username">
    <input type="password" placeholder="Password">
    <button id="btn">Entrar</button>
  </div>

</div>

<!-- CARD FINAL -->
<div class="overlay hidden" id="overlay">
  <div class="card" id="cardContent"></div>
</div>

<script src="script.js"></script>
</body>
</html>
